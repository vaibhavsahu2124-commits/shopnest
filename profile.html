<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Profile</title>

<link rel="stylesheet"
href="css/dashboard.css">

</head>

<body>

<div class="profile-container">

<h1>My Profile</h1>

<input
type="file"
id="profileImage"
accept="image/*"
>

<img
id="preview"
width="120"
>

<input
type="text"
id="name"
placeholder="Full Name"
>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="text"
id="phone"
placeholder="Phone Number"
>

<input
type="text"
id="city"
placeholder="City"
>

<input
type="text"
id="state"
placeholder="State"
>

<input
type="text"
id="pincode"
placeholder="Pincode"
>

<textarea
id="address"
placeholder="Address">
</textarea>

<button onclick="saveProfile()">
Save Profile
</button>

</div>

<script src="js/profile.js"></script>

</body>
</html>
